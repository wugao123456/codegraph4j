<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>CodeGraph Viewer</title>
<script src="/assets/vis-network.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #0f1117; color: #e5e7eb; }
  #header { padding: 12px 18px; background: #171a21; border-bottom: 1px solid #2a2e37; display: flex;
            align-items: center; gap: 16px; flex-wrap: wrap; }
  #header h1 { font-size: 15px; margin: 0; font-weight: 600; color: #f3f4f6; }
  #header .stat { font-size: 13px; color: #9ca3af; }
  #mode-select { background: #0f1117; border: 1px solid #2a2e37; color: #e5e7eb; padding: 6px 10px;
                 border-radius: 6px; font-size: 13px; }
  #query-input { background: #0f1117; border: 1px solid #2a2e37; color: #e5e7eb; padding: 6px 10px;
                 border-radius: 6px; font-size: 13px; width: 260px; }
  #query-btn { background: #3b82f6; color: #fff; border: none; padding: 7px 16px; border-radius: 6px;
               cursor: pointer; font-size: 13px; font-weight: 500; }
  #query-btn:hover { background: #2563eb; }
  #query-btn:disabled { background: #374151; cursor: not-allowed; }
  #status { font-size: 12px; color: #6b7280; }
  #legend { padding: 8px 18px; display: flex; gap: 14px; flex-wrap: wrap; background: #12141a;
            border-bottom: 1px solid #2a2e37; font-size: 12px; }
  .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
  .legend-item { display: flex; align-items: center; color: #9ca3af; }
  #toolbar { padding: 8px 18px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
             background: #12141a; border-bottom: 1px solid #2a2e37; font-size: 12px; }
  #search { background: #0f1117; border: 1px solid #2a2e37; color: #e5e7eb; padding: 5px 8px;
            border-radius: 6px; font-size: 12px; width: 180px; }
  #network { width: 100vw; height: calc(100vh - 130px); }
  .loading-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
                     color: #9ca3af; font-size: 14px; }
</style>
</head>
<body>
  <div id="header">
    <h1>CodeGraph Viewer</h1>
    <select id="mode-select">
      <option value="full">Full Graph</option>
      <option value="symbol">Symbol Query</option>
      <option value="file">File Query</option>
    </select>
    <input id="query-input" type="text" placeholder="Enter symbol name or file path...">
    <button id="query-btn" onclick="doQuery()">Query</button>
    <span id="status" class="stat">Ready</span>
  </div>
  <div id="legend"></div>
  <div id="toolbar">
    <input id="search" type="text" placeholder="Filter nodes...">
    <span id="stats-display" class="stat"></span>
  </div>
  <div id="network"></div>
  <div id="loading" class="loading-overlay">Loading graph data...</div>

<script>
// ---- 节点类型颜色映射（与 viewer.ts 一致） ----
const KIND_COLORS = {
  file: '#6b7280', module: '#6b7280',
  class: '#f59e0b', struct: '#f59e0b',
  interface: '#eab308', trait: '#eab308', protocol: '#eab308',
  function: '#3b82f6', method: '#2563eb',
  property: '#06b6d4', field: '#06b6d4',
  variable: '#10b981', constant: '#10b981',
  enum: '#a855f7', enum_member: '#a855f7',
  type_alias: '#8b5cf6', namespace: '#94a3b8',
  parameter: '#94a3b8', import: '#cbd5e1', export: '#cbd5e1',
  route: '#ef4444', component: '#ec4899'
};
const DEFAULT_COLOR = '#94a3b8';

let network = null;
let nodesData = null;
let edgesData = null;
let requestId = 0;

// ---- vis-network 初始化 ----
function initNetwork() {
  // 先隐藏 loading，避免 vis.Network 替换 #network 内容后找不到该元素
  document.getElementById('loading').style.display = 'none';

  nodesData = new vis.DataSet([]);
  edgesData = new vis.DataSet([]);
  const container = document.getElementById('network');
  const data = { nodes: nodesData, edges: edgesData };
  const options = {
    nodes: {
      shape: 'dot',
      font: { color: '#e5e7eb', size: 12 },
      borderWidth: 1,
      scaling: { min: 6, max: 42 }
    },
    edges: {
      color: { color: '#374151', highlight: '#60a5fa' },
      font: { color: '#6b7280', size: 9, strokeWidth: 0 },
      smooth: { type: 'continuous' }
    },
    physics: {
      enabled: true,
      solver: 'forceAtlas2Based',
      forceAtlas2Based: {
        gravitationalConstant: -60, centralGravity: 0.008,
        springLength: 110, springConstant: 0.06,
        damping: 0.5, avoidOverlap: 1
      },
      stabilization: { iterations: 250, fit: true },
      minVelocity: 0.6, timestep: 0.4
    },
    interaction: {
      hover: true, tooltipDelay: 100,
      dragNodes: true, dragView: true,
      zoomView: true, zoomSpeed: 0.6,
      multiselect: true, navigationButtons: false, keyboard: false
    }
  };
  network = new vis.Network(container, data, options);

  network.once('stabilizationIterationsDone', () => {
    network.fit();
    network.setOptions({ physics: { minVelocity: 0.9 } });
  });

  const MIN_ZOOM = 0.15, MAX_ZOOM = 4.0;
  network.on('zoom', () => {
    const s = network.getScale();
    if (s < MIN_ZOOM) network.moveTo({ scale: MIN_ZOOM });
    else if (s > MAX_ZOOM) network.moveTo({ scale: MAX_ZOOM });
  });

  network.on('dragStart', () => network.setOptions({ physics: { enabled: true } }));

  document.getElementById('search').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    if (!q) { nodesData.forEach(n => nodesData.update({ id: n.id, hidden: false })); return; }
    nodesData.forEach(n => {
      nodesData.update({ id: n.id, hidden: !n.label.toLowerCase().includes(q) });
    });
  });

  // Enter 键触发查询
  document.getElementById('query-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') doQuery();
  });
}

// ---- JSON-RPC API 调用 ----
async function apiCall(method, params) {
  const id = 'web-' + (++requestId);
  const response = await fetch('/api/mcp', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ jsonrpc: '2.0', id, method, params })
  });
  return response.json();
}

// ---- 查询按钮 ----
async function doQuery() {
  const mode = document.getElementById('mode-select').value;
  const query = document.getElementById('query-input').value.trim();
  const btn = document.getElementById('query-btn');
  const status = document.getElementById('status');

  btn.disabled = true;
  status.textContent = 'Querying...';
  document.getElementById('loading').style.display = 'block';

  try {
    const params = { maxNodes: 250 };

    if (mode === 'symbol' && query) {
      params.symbol = query;
    } else if (mode === 'file' && query) {
      params.file = query;
    }
    // full graph 模式：无 query 参数

    const result = await apiCall('graph/view', params);

    if (result.error) {
      status.textContent = 'Error: ' + result.error.message;
      document.getElementById('loading').style.display = 'none';
      btn.disabled = false;
      return;
    }

    const data = result.result;
    if (!data || !data.nodes) {
      status.textContent = 'No data returned';
      document.getElementById('loading').style.display = 'none';
      btn.disabled = false;
      return;
    }

    renderGraph(data);
    status.textContent = 'OK — ' + data.stats.totalNodes + ' nodes, ' + data.stats.totalEdges + ' edges';
  } catch (err) {
    status.textContent = 'Error: ' + err.message;
  }

  document.getElementById('loading').style.display = 'none';
  btn.disabled = false;
}

// ---- 渲染图谱 ----
function renderGraph(data) {
  nodesData.clear();
  edgesData.clear();

  // 添加节点
  const nodes = (data.nodes || []).map(n => ({
    id: n.id,
    label: n.label,
    title: n.title,
    group: n.group,
    color: n.color || KIND_COLORS[n.group] || DEFAULT_COLOR,
    value: n.value || 10
  }));
  nodesData.add(nodes);

  // 添加边
  const edges = (data.edges || []).map(e => ({
    from: e.from,
    to: e.to,
    label: e.label,
    arrows: e.arrows || 'to',
    title: e.title || e.label
  }));
  edgesData.add(edges);

  // 更新图例
  const kinds = data.stats && data.stats.kinds ? data.stats.kinds : [];
  const legendHtml = kinds.map(kind => {
    const color = KIND_COLORS[kind] || DEFAULT_COLOR;
    return '<span class="legend-item"><span class="swatch" style="background:' + color + '"></span>' + kind + '</span>';
  }).join('');
  document.getElementById('legend').innerHTML = legendHtml || '<span style="color:#6b7280">No data</span>';

  // 更新统计
  document.getElementById('stats-display').textContent =
    (data.stats ? data.stats.totalNodes : 0) + ' symbols · ' +
    (data.stats ? data.stats.totalEdges : 0) + ' relationships';

  // 自适应视图
  network.fit({ animation: { duration: 500, easingFunction: 'easeInOutQuad' } });
}

// ---- 启动 ----
window.addEventListener('load', () => {
  initNetwork();
  // 自动加载全图
  doQuery();
});
</script>
</body>
</html>
