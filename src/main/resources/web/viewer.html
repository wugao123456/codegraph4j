<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>CodeGraph Viewer</title>
<script src="/assets/vis-network.min.js"></script>
<script src="/web/viewer.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #0f1117; color: #e5e7eb; overflow: hidden; }
  #header { padding: 12px 18px; background: #171a21; border-bottom: 1px solid #2a2e37; display: flex;
            align-items: center; gap: 16px; flex-wrap: wrap; flex-shrink: 0; }
  #header h1 { font-size: 15px; margin: 0; font-weight: 600; color: #f3f4f6; }
  #header .stat { font-size: 13px; color: #9ca3af; }
  .selector { background: #0f1117; border: 1px solid #2a2e37; color: #e5e7eb; padding: 6px 10px;
              border-radius: 6px; font-size: 13px; }
  #query-input { background: #0f1117; border: 1px solid #2a2e37; color: #e5e7eb; padding: 6px 10px;
                 border-radius: 6px; font-size: 13px; width: 260px; }
  #query-btn { background: #3b82f6; color: #fff; border: none; padding: 7px 16px; border-radius: 6px;
               cursor: pointer; font-size: 13px; font-weight: 500; }
  #query-btn:hover { background: #2563eb; }
  #query-btn:disabled { background: #374151; cursor: not-allowed; }
  #status { font-size: 12px; color: #6b7280; }
  #legend { padding: 8px 18px; display: flex; gap: 14px; flex-wrap: wrap; background: #12141a;
            border-bottom: 1px solid #2a2e37; font-size: 12px; flex-shrink: 0; }
  .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
  .legend-item { display: flex; align-items: center; color: #9ca3af; }
  #toolbar { padding: 8px 18px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
             background: #12141a; border-bottom: 1px solid #2a2e37; font-size: 12px; flex-shrink: 0; }
  #main-container { display: flex; flex: 1; height: calc(100vh - 130px); overflow: hidden; }
  #network { flex: 1; width: auto; height: 100%; }
  .loading-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
                     color: #9ca3af; font-size: 14px; }
  #node-info-panel { position: fixed; top: 130px; right: -300px; width: 300px; height: calc(100vh - 130px);
                     background: #171a21; border-left: 1px solid #2a2e37; z-index: 100;
                     padding: 16px; transition: right 0.2s ease; overflow-y: auto; }
  #node-info-panel.show { right: 0; }
  #node-info-panel h3 { margin: 0 0 12px 0; font-size: 15px; color: #f3f4f6; }
  #node-info-panel .info-row { display: flex; margin-bottom: 8px; font-size: 13px; }
  #node-info-panel .info-label { width: 70px; color: #9ca3af; flex-shrink: 0; }
  #node-info-panel .info-value { color: #e5e7eb; word-break: break-all; }
  #node-info-panel .close-btn { margin-top: 12px; padding: 4px 12px; background: #374151;
                                color: #e5e7eb; border: none; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>
  <div id="header">
    <h1>CodeGraph Viewer</h1>
    <select id="degree-select" class="selector">
      <option value="1" selected>1度</option>
      <option value="2">2度</option>
      <option value="3">3度</option>
      <option value="4">4度</option>
      <option value="5">5度</option>
    </select>
    <select id="mode-select" class="selector">
      <option value="symbol">Symbol Query</option>
      <option value="file">File Query</option>
    </select>
    <input id="query-input" type="text" placeholder="Enter symbol name or file path...">
    <button id="query-btn" onclick="doQuery()">Query</button>
    <span id="status" class="stat">Ready</span>
  </div>
  <div id="legend"></div>
  <div id="toolbar">
    <span id="stats-display" class="stat"></span>
  </div>
  <div id="main-container">
    <div id="network"></div>
  </div>
  <div id="loading" class="loading-overlay">Loading graph data...</div>

  <div id="node-info-panel">
    <h3 id="node-info-title">Node Info</h3>
    <div id="node-info-content"></div>
    <button class="close-btn" onclick="closeNodeInfo()">Close</button>
  </div>
</body>
</html>
